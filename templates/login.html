<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.ico"><link rel="manifest" href="/manifest.json"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="{{ company_name }}"><link rel="apple-touch-icon" href="/static/logo_custom.png">
    <title>Connexion - {{ company_name }}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; box-sizing: border-box; margin: 16px; }
        @media (max-width: 400px) { .login-box { padding: 24px 20px; } }
        h1 { color: #d4af37; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #d4af37; color: #2c3e50; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s;}
        button:hover { background-color: #aa8c2c; color: white; }
        .error { color: red; margin-bottom: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-box">
        {% if logo_url %}
        <img src="{{ logo_url }}" alt="Logo" style="max-height:80px; max-width:100%; margin-bottom:20px; object-fit:contain;">
        {% endif %}
        <h1>Espace Pro</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Nom d'utilisateur" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        <p style="margin-top:16px; font-size:0.88rem;"><a href="/mot-de-passe-oublie" style="color:#d4af37; font-weight:600;">Mot de passe oublié ?</a></p>
        <p style="margin-top:6px; font-size:0.88rem; color:#555;">Pas encore de compte ? <a href="/inscription" style="color:#d4af37; font-weight:600;">Créer un compte</a></p>
    </div>
</body>
</html>
