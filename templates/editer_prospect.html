<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.ico"><link rel="manifest" href="/manifest.json"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="{{ company_name }}"><link rel="apple-touch-icon" href="/static/logo_custom.png"><title>Éditer — {{ prospect.etablissement }}</title>
<style>
:root { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --text-muted: #64748b; --primary: #1e40af; --primary-hover: #1e3a8a; --accent: #d4af37; --border: #cbd5e1; --danger: #dc2626; --success: #16a34a; }
body.dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; --primary: #3b82f6; --primary-hover: #60a5fa; --border: #334155; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
.container { max-width: 760px; margin: 28px auto; background: var(--card); padding: 28px; border-radius: 8px; border: 1px solid var(--border); }
h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin: 20px 0 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); }
input[type=text], input[type=email], input[type=date], select, textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 9px 12px; font-size: 0.9rem; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
input:focus, select:focus, textarea:focus { border-color: var(--primary); }
.checkbox-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
.checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; font-family: inherit; transition: 0.15s; text-decoration: none; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
.alert-error { background: rgba(220,38,38,0.08); border:1px solid rgba(220,38,38,0.3); border-radius:6px; padding:10px 14px; margin-bottom:16px; color:var(--danger); font-size:0.9rem; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .container { margin: 8px; padding: 16px; } }
</style>
</head><body class="{% if theme == 'dark' %}dark-mode{% endif %}">
{% include '_navbar.html' %}
<div class="container">
    <h1>Éditer — {{ prospect.etablissement }}</h1>

    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="section-title">L'entreprise</div>
        <div class="form-row">
            <div class="form-group">
                <label>Entreprise *</label>
                <input type="text" name="etablissement" value="{{ prospect.etablissement }}" required>
            </div>
            <div class="form-group">
                <label>Contact / Recruteur</label>
                <input type="text" name="contact" value="{{ prospect.contact or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ prospect.email or '' }}">
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="text" name="telephone" value="{{ prospect.telephone or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Ville</label>
                <input type="text" name="ville" value="{{ prospect.ville or '' }}">
            </div>
            <div class="form-group">
                <label>Code postal</label>
                <input type="text" name="code_postal" value="{{ prospect.code_postal or '' }}" maxlength="10">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Secteur d'activité</label>
                <select name="categorie">
                    <option value="">— Sélectionner —</option>
                    {% for s in SECTEURS %}
                    <option value="{{ s }}" {% if prospect.categorie == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                    {% if prospect.categorie and prospect.categorie not in SECTEURS %}
                    <option value="{{ prospect.categorie }}" selected>{{ prospect.categorie }}</option>
                    {% endif %}
                </select>
            </div>
            <div class="form-group">
                <label>Adresse</label>
                <input type="text" name="adresse" value="{{ prospect.adresse or '' }}">
            </div>
        </div>

        <div class="section-title">La candidature</div>
        <div class="form-row">
            <div class="form-group">
                <label>Poste visé</label>
                <input type="text" name="poste" value="{{ prospect.poste or '' }}">
            </div>
            <div class="form-group">
                <label>Type de contrat</label>
                <select name="type_contrat">
                    <option value="">— Sélectionner —</option>
                    {% for tc in TYPES_CONTRAT %}
                    <option value="{{ tc }}" {% if prospect.type_contrat == tc %}selected{% endif %}>{{ tc }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Plateforme / Source</label>
                <select name="plateforme">
                    <option value="">— Sélectionner —</option>
                    {% for pl in PLATEFORMES %}
                    <option value="{{ pl }}" {% if prospect.plateforme == pl %}selected{% endif %}>{{ pl }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Statut</label>
                <select name="statut">
                    {% for s in STATUTS %}
                    <option value="{{ s }}" {% if prospect.statut == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                    {% if prospect.statut and prospect.statut not in STATUTS %}
                    <option value="{{ prospect.statut }}" selected>{{ prospect.statut }}</option>
                    {% endif %}
                </select>
            </div>
        </div>

        <div class="section-title">Documents envoyés</div>
        <div class="checkbox-row">
            <label class="checkbox-item">
                <input type="checkbox" name="cv_envoye" {% if prospect.cv_envoye %}checked{% endif %}> CV envoyé
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="lettre_envoyee" {% if prospect.lettre_envoyee %}checked{% endif %}> Lettre de motivation envoyée
            </label>
        </div>

        <div class="section-title">Suivi</div>
        <div class="form-row">
            <div class="form-group">
                <label>Date de relance</label>
                <input type="date" name="date_relance" value="{{ prospect.date_relance or '' }}">
            </div>
            <div class="form-group"></div>
        </div>
        <div class="form-group">
            <label>Commentaire / Notes</label>
            <textarea name="commentaire" rows="4">{{ prospect.commentaire or '' }}</textarea>
        </div>

        <div style="display:flex;gap:10px;margin-top:8px;">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="/prospect/{{ prospect.id }}" class="btn btn-ghost">Annuler</a>
        </div>
    </form>
</div>
</body></html>
